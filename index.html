<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Gewicht Tracker</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>

body{
font-family:-apple-system,Arial;
margin:0;
background:#f2f2f7;
}

header{
background:#007aff;
color:white;
padding:18px;
text-align:center;
font-size:22px;
font-weight:bold;
}

nav{
display:flex;
justify-content:center;
gap:10px;
margin:15px;
}

button{
padding:10px 14px;
border:none;
background:#007aff;
color:white;
border-radius:10px;
font-size:15px;
}

.container{
max-width:900px;
margin:auto;
background:white;
padding:20px;
border-radius:14px;
box-shadow:0 3px 10px rgba(0,0,0,0.1);
}

input{
padding:10px;
margin:6px;
font-size:16px;
border-radius:8px;
border:1px solid #ccc;
}

.stats{
display:grid;
grid-template-columns:1fr 1fr;
gap:10px;
margin-top:15px;
}

.statBox{
background:#f2f2f7;
padding:12px;
border-radius:10px;
text-align:center;
font-size:16px;
}

.chartFilter{
margin-bottom:15px;
display:flex;
gap:8px;
flex-wrap:wrap;
}

</style>
</head>

<body>

<header>
Gewicht Tracker
</header>

<nav>
<button onclick="showPage('home')">Übersicht</button>
<button onclick="showPage('entry')">Gewicht eintragen</button>
</nav>


<div id="home" class="container">

<h3>Startdaten</h3>

<div>

Startgewicht (kg)

<input type="number" id="startWeight">

Zielgewicht (kg)

<input type="number" id="goalWeight">

Körpergröße (cm)

<input type="number" id="height">

<button onclick="saveStart()">Speichern</button>

</div>


<div class="stats">

<div class="statBox">
Start BMI<br>
<span id="startBMI">-</span>
</div>

<div class="statBox">
Aktueller BMI<br>
<span id="currentBMI">-</span>
</div>

<div class="statBox">
Veränderung<br>
<span id="diffWeight">-</span>
</div>

<div class="statBox">
Noch bis Ziel<br>
<span id="goalDiff">-</span>
</div>

<div class="statBox">
Wochendurchschnitt<br>
<span id="weekAvg">-</span>
</div>

</div>


<h3 style="margin-top:20px;">Gewichtsentwicklung</h3>

<div class="chartFilter">
<button onclick="updateChart('week')">Woche</button>
<button onclick="updateChart('month')">Monat</button>
<button onclick="updateChart('year')">Jahr</button>
<button onclick="updateChart('all')">Gesamt</button>
</div>

<canvas id="chart"></canvas>

</div>


<div id="entry" class="container" style="display:none">

<h3>Tagesgewicht eintragen</h3>

Datum

<input type="date" id="date">

Gewicht (kg)

<input type="number" id="weight">

<br>

<button onclick="addWeight()">Speichern</button>

</div>


<script>

let chart

function showPage(page){

document.getElementById("home").style.display="none"
document.getElementById("entry").style.display="none"

document.getElementById(page).style.display="block"

}


function saveStart(){

localStorage.setItem("startWeight",document.getElementById("startWeight").value)
localStorage.setItem("goalWeight",document.getElementById("goalWeight").value)
localStorage.setItem("height",document.getElementById("height").value)

updateStats()

}


function addWeight(){

let data=JSON.parse(localStorage.getItem("weights")||"[]")

data.push({
date:document.getElementById("date").value,
weight:parseFloat(document.getElementById("weight").value)
})

data.sort((a,b)=>new Date(a.date)-new Date(b.date))

localStorage.setItem("weights",JSON.stringify(data))

updateStats()
updateChart("all")

alert("Gespeichert")

}


function updateStats(){

let startWeight=parseFloat(localStorage.getItem("startWeight"))
let goalWeight=parseFloat(localStorage.getItem("goalWeight"))
let height=parseFloat(localStorage.getItem("height"))

let data=JSON.parse(localStorage.getItem("weights")||"[]")

if(!startWeight || !height) return

let current=startWeight

if(data.length>0){

current=data[data.length-1].weight

}

let h=height/100

let startBMI=(startWeight/(h*h)).toFixed(1)
let currentBMI=(current/(h*h)).toFixed(1)

document.getElementById("startBMI").innerText=startBMI
document.getElementById("currentBMI").innerText=currentBMI

let diff=(current-startWeight).toFixed(1)

document.getElementById("diffWeight").innerText=diff+" kg"

if(goalWeight){

let goal=(current-goalWeight).toFixed(1)

document.getElementById("goalDiff").innerText=goal+" kg"

}

calculateWeekAverage()

}


function calculateWeekAverage(){

let data=JSON.parse(localStorage.getItem("weights")||"[]")

let now=new Date()

let week=[]

data.forEach(e=>{

let d=new Date(e.date)

let diff=(now-d)/(1000*60*60*24)

if(diff<=7){

week.push(e.weight)

}

})

if(week.length==0) return

let avg=week.reduce((a,b)=>a+b)/week.length

document.getElementById("weekAvg").innerText=avg.toFixed(1)+" kg"

}


function updateChart(range){

let data=JSON.parse(localStorage.getItem("weights")||"[]")

let labels=[]
let values=[]

let now=new Date()

data.forEach(e=>{

let d=new Date(e.date)

let diff=(now-d)/(1000*60*60*24)

let show=false

if(range=="week" && diff<=7) show=true
if(range=="month" && diff<=30) show=true
if(range=="year" && diff<=365) show=true
if(range=="all") show=true

if(show){

labels.push(e.date)
values.push(e.weight)

}

})

if(chart) chart.destroy()

chart=new Chart(document.getElementById("chart"),{

type:"line",

data:{
labels:labels,
datasets:[{
label:"Gewicht",
data:values,
tension:0.3
}]
}

})

}


updateStats()
updateChart("all")

</script>

</body>
</html>
