<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Gewicht Tracker</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>

body{
font-family:-apple-system,Arial;
margin:0;
background:#f2f2f7;
}

header{
background:#007aff;
color:white;
padding:18px;
text-align:center;
font-size:22px;
font-weight:bold;
}

nav{
display:flex;
justify-content:center;
gap:10px;
margin:15px;
}

button{
padding:10px 14px;
border:none;
background:#007aff;
color:white;
border-radius:10px;
font-size:15px;
cursor:pointer;
}

.container{
max-width:900px;
margin:auto;
background:white;
padding:20px;
border-radius:14px;
box-shadow:0 3px 10px rgba(0,0,0,0.1);
}

input{
padding:8px;
font-size:15px;
border-radius:8px;
border:1px solid #ccc;
margin:5px;
}

.stats{
display:grid;
grid-template-columns:1fr 1fr;
gap:10px;
margin-top:15px;
}

.statBox{
background:#f2f2f7;
padding:12px;
border-radius:10px;
text-align:center;
font-size:16px;
}

table{
width:100%;
border-collapse:collapse;
margin-top:20px;
}

th,td{
padding:8px;
border-bottom:1px solid #ddd;
text-align:center;
}

.deleteBtn{
background:#ff3b30;
}

.resetBtn{
background:#ff3b30;
margin-top:15px;
}

</style>
</head>

<body>

<header>Gewicht Tracker</header>

<nav>
<button onclick="showPage('home')">Übersicht</button>
<button onclick="showPage('entry')">Gewicht eintragen</button>
</nav>


<div id="home" class="container">

<h3>Startdaten</h3>

Startgewicht (kg)
<input type="number" id="startWeight">

Zielgewicht (kg)
<input type="number" id="goalWeight">

Körpergröße (cm)
<input type="number" id="height">

<button onclick="saveStart()">Speichern</button>

<br>

<button class="resetBtn" onclick="resetApp()">
App komplett zurücksetzen
</button>


<div class="stats">

<div class="statBox">
Start BMI<br>
<span id="startBMI">-</span>
</div>

<div class="statBox">
Aktueller BMI<br>
<span id="currentBMI">-</span>
</div>

<div class="statBox">
Veränderung<br>
<span id="diffWeight">-</span>
</div>

<div class="statBox">
Noch bis Ziel<br>
<span id="goalDiff">-</span>
</div>

<div class="statBox">
Wochendurchschnitt<br>
<span id="weekAvg">-</span>
</div>

</div>

<h3 style="margin-top:20px;">Gewichtsentwicklung</h3>

<canvas id="chart"></canvas>

</div>



<div id="entry" class="container" style="display:none">

<h3>Gewicht eintragen</h3>

Datum
<input type="date" id="date">

Gewicht (kg)
<input type="number" id="weight">

<button onclick="addWeight()">Speichern</button>


<h3 style="margin-top:25px;">Alle Einträge</h3>

<table>

<thead>
<tr>
<th>Datum</th>
<th>Gewicht</th>
<th>Speichern</th>
<th>Löschen</th>
</tr>
</thead>

<tbody id="weightTable"></tbody>

</table>

</div>



<script>

let chart


function showPage(page){

document.getElementById("home").style.display="none"
document.getElementById("entry").style.display="none"

document.getElementById(page).style.display="block"

renderTable()

}



function saveStart(){

localStorage.setItem("startWeight",document.getElementById("startWeight").value)
localStorage.setItem("goalWeight",document.getElementById("goalWeight").value)
localStorage.setItem("height",document.getElementById("height").value)

updateStats()

}



function addWeight(){

let data=JSON.parse(localStorage.getItem("weights")||"[]")

data.push({
date:document.getElementById("date").value,
weight:parseFloat(document.getElementById("weight").value)
})

localStorage.setItem("weights",JSON.stringify(data))

renderTable()
updateStats()
updateChart()

}



function renderTable(){

let data=JSON.parse(localStorage.getItem("weights")||"[]")

data.sort((a,b)=> new Date(b.date) - new Date(a.date))

let table=document.getElementById("weightTable")

table.innerHTML=""

data.forEach((e,i)=>{

table.innerHTML+=`

<tr>

<td>
<input type="date" value="${e.date}" id="date${i}">
</td>

<td>
<input type="number" value="${e.weight}" id="weight${i}">
</td>

<td>
<button onclick="saveEdit(${i})">💾</button>
</td>

<td>
<button class="deleteBtn" onclick="deleteEntry(${i})">X</button>
</td>

</tr>

`

})

}



function saveEdit(i){

let data=JSON.parse(localStorage.getItem("weights")||"[]")

data.sort((a,b)=> new Date(b.date) - new Date(a.date))

data[i].date=document.getElementById("date"+i).value
data[i].weight=parseFloat(document.getElementById("weight"+i).value)

localStorage.setItem("weights",JSON.stringify(data))

updateStats()
updateChart()

}



function deleteEntry(i){

let data=JSON.parse(localStorage.getItem("weights")||"[]")

data.sort((a,b)=> new Date(b.date) - new Date(a.date))

data.splice(i,1)

localStorage.setItem("weights",JSON.stringify(data))

renderTable()
updateStats()
updateChart()

}



function updateStats(){

let startWeight=parseFloat(localStorage.getItem("startWeight"))
let goalWeight=parseFloat(localStorage.getItem("goalWeight"))
let height=parseFloat(localStorage.getItem("height"))

let data=JSON.parse(localStorage.getItem("weights")||"[]")

if(!startWeight || !height) return

let current=startWeight

if(data.length>0){

data.sort((a,b)=> new Date(a.date) - new Date(b.date))

current=data[data.length-1].weight

}

let h=height/100

document.getElementById("startBMI").innerText=(startWeight/(h*h)).toFixed(1)
document.getElementById("currentBMI").innerText=(current/(h*h)).toFixed(1)

document.getElementById("diffWeight").innerText=(current-startWeight).toFixed(1)+" kg"

if(goalWeight){

document.getElementById("goalDiff").innerText=(current-goalWeight).toFixed(1)+" kg"

}

calculateWeekAverage()

}



function calculateWeekAverage(){

let data=JSON.parse(localStorage.getItem("weights")||"[]")

let now=new Date()

let week=[]

data.forEach(e=>{

let d=new Date(e.date)

let diff=(now-d)/(1000*60*60*24)

if(diff<=7){

week.push(e.weight)

}

})

if(week.length==0) return

let avg=week.reduce((a,b)=>a+b)/week.length

document.getElementById("weekAvg").innerText=avg.toFixed(1)+" kg"

}



function updateChart(){

let data=JSON.parse(localStorage.getItem("weights")||"[]")

data.sort((a,b)=> new Date(a.date) - new Date(b.date))

let labels=data.map(e=>e.date)
let values=data.map(e=>e.weight)

if(chart) chart.destroy()

chart=new Chart(document.getElementById("chart"),{

type:"line",

data:{
labels:labels,
datasets:[{
label:"Gewicht",
data:values,
tension:0.3
}]
}

})

}



function resetApp(){

if(confirm("Alle Daten wirklich löschen?")){

localStorage.clear()

location.reload()

}

}



updateStats()
updateChart()

</script>

</body>
</html>
